openapi: 3.0.0
info:
  title: LiteParse API
  version: 1.0.0
  description: |
    REST API wrapper for LiteParse — a fast, open-source document parser.
    Supports PDF, DOCX, PPTX, XLSX, and images.
    All `/parse` endpoints require an API key via the `x-api-key` header.

servers:
  - url: http://localhost:3000
    description: Local development / Codespaces

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: 1.0.0
        service:
          type: string
          example: liteparse-api

    ParseResult:
      type: object
      properties:
        data:
          type: object
          properties:
            filename:
              type: string
              example: report.pdf
            mimetype:
              type: string
              example: application/pdf
            size_bytes:
              type: integer
              example: 204800
            format:
              type: string
              enum: [text, json]
              example: text
            result:
              description: Parsed content — plain string for format=text, structured object for format=json
              oneOf:
                - type: string
                  description: Extracted text (format=text)
                - type: object
                  description: Structured JSON with bounding boxes (format=json)

    ScreenshotResult:
      type: object
      properties:
        data:
          type: object
          properties:
            filename:
              type: string
              example: report.pdf
            page_count:
              type: integer
              example: 5
            pages:
              type: array
              items:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  format:
                    type: string
                    example: png
                  data:
                    type: string
                    format: byte
                    description: Base64-encoded PNG image

    Error:
      type: object
      properties:
        error:
          type: string
          example: Missing x-api-key header

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status. No authentication required.
      security: []
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api-docs:
    get:
      summary: Swagger UI — interactive API documentation
      description: Interactive API docs. No authentication required.
      security: []
      tags: [Docs]
      responses:
        '200':
          description: HTML page with Swagger UI

  /parse:
    post:
      summary: Parse a document
      description: |
        Upload a document (PDF, DOCX, PPTX, XLSX, or image) and receive extracted text or structured JSON with bounding boxes.

        **Supported formats:** PDF, DOCX, DOC, PPTX, PPT, XLSX, XLS, JPEG, PNG, GIF, WEBP, TIFF

        > **Note:** DOCX/PPTX/XLSX conversion requires LibreOffice to be installed. Image conversion requires ImageMagick.
      tags: [Parse]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file to parse
                format:
                  type: string
                  enum: [text, json]
                  default: text
                  description: Output format — "text" for plain text, "json" for structured data with bounding boxes
                no_ocr:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Set to "true" to disable OCR
                ocr_language:
                  type: string
                  default: eng
                  description: Tesseract OCR language code (e.g. "eng", "fra", "deu")
                max_pages:
                  type: integer
                  default: 1000
                  description: Maximum number of pages to parse
                target_pages:
                  type: string
                  example: "1-5,10,15-20"
                  description: Page range to parse (e.g. "1-5,10,15-20"). Omit to parse all pages.
                password:
                  type: string
                  description: Password for encrypted PDF documents
      responses:
        '200':
          description: Document parsed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /parse/screenshot:
    post:
      summary: Generate page screenshots from a PDF
      description: |
        Upload a PDF and receive base64-encoded PNG screenshots of each page.
        Useful for feeding document pages to LLM vision models.
      tags: [Parse]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to screenshot
                target_pages:
                  type: string
                  example: "1,3,5"
                  description: Pages to screenshot (e.g. "1,3,5" or "1-5"). Omit for all pages.
                dpi:
                  type: integer
                  default: 150
                  description: Rendering DPI — higher values produce larger, sharper images
                password:
                  type: string
                  description: Password for encrypted PDF documents
      responses:
        '200':
          description: Screenshots generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenshotResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Screenshot error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
